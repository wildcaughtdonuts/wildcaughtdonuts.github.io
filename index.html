<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>건축물대국 서비스 종료 안내</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="건축물대국 서비스 종료 및 소방체크 이전 안내">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #f5f7fb;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .notice-box {
      width: 100%;
      max-width: 680px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      padding: 48px 32px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff1f1;
      color: #cc2f2f;
      font-weight: 700;
      font-size: 14px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 32px;
      line-height: 1.4;
      color: #111;
    }

    p {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.8;
      color: #444;
      word-break: keep-all;
    }

    .service-name {
      font-weight: 700;
      color: #d62828;
    }

    .link-button {
      display: inline-block;
      margin-top: 28px;
      padding: 16px 28px;
      background: #d62828;
      color: #fff;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      border-radius: 12px;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .link-button:hover {
      background: #b71f1f;
      transform: translateY(-1px);
    }

    .link-url {
      margin-top: 18px;
      font-size: 15px;
      color: #777;
      word-break: break-all;
    }

    @media (max-width: 640px) {
      .notice-box {
        padding: 36px 22px;
      }

      h1 {
        font-size: 26px;
      }

      p {
        font-size: 16px;
      }

      .link-button {
        width: 100%;
        padding: 15px 20px;
        font-size: 17px;
      }
    }
  </style>
</head>

<body>
  <div class="notice-box">
    <div class="badge">서비스 종료 안내</div>
    <h1>건축물대국 서비스를 종료했습니다.</h1>
    <p>
      기존 <strong>건축물대국</strong> 서비스는 운영을 종료하였으며,
      신규 서비스인 <span class="service-name">소방체크</span>로 이전되었습니다.
    </p>
    <p>
      앞으로는 아래 페이지에서 서비스를 이용해 주세요.
    </p>

    <a class="link-button" href="https://sobangcheck.com/" target="_blank" rel="noopener noreferrer">
      소방체크 바로가기
    </a>

    <div class="link-url">
      https://sobangcheck.com/
    </div>
  </div>
</body>

</html>
